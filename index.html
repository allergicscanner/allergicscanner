<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Allergie Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #6366f1, #22c55e);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 28px;
}

video {
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
  margin-top: 15px;
}

button {
  margin-top: 20px;
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: white;
  color: black;
}

#resultBox {
  margin: 25px auto;
  padding: 20px;
  border-radius: 15px;
  font-size: 22px;
  font-weight: bold;
  width: 80%;
}

.green { background: #22c55e; }
.yellow { background: #eab308; }
.orange { background: #f97316; }
.red { background: #ef4444; }

#status {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Allergie Scanner</h1>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<br>
<button onclick="scan()">📸 Scannen</button>

<p id="status"></p>
<div id="resultBox"></div>

<script>
const HF_API_KEY = "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"; // ← HIER deinen Token einsetzen

const video = document.getElementById('video');

// Kamera starten
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => video.srcObject = stream)
.catch(() => alert("Kamera nicht verfügbar"));

async function scan() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  document.getElementById("status").innerText = "Scanne Text...";

  const { data: { text } } = await Tesseract.recognize(canvas, 'eng');

  document.getElementById("status").innerText = "Analysiere mit KI...";

  try {
    const response = await fetch(
      "https://api-inference.huggingface.co/models/facebook/bart-large-mnli",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + HF_API_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          inputs: text,
          parameters: {
            candidate_labels: [
              "contains peanuts",
              "may contain peanuts",
              "traces of peanuts",
              "no peanuts"
            ]
          }
        })
      }
    );

    const data = await response.json();

    const label = data.labels[0];

    if (label === "contains peanuts") {
      show("🔴 Enthält Erdnüsse", "red");
    } else if (label === "may contain peanuts") {
      show("🟡 Kann enthalten", "yellow");
    } else if (label === "traces of peanuts") {
      show("🟠 Spuren möglich", "orange");
    } else {
      show("🟢 Keine Erdnüsse", "green");
    }

  } catch (e) {
    // Fallback (wenn KI nicht geht)
    fallbackCheck(text);
  }
}

// Backup ohne KI
function fallbackCheck(text) {
  const t = text.toLowerCase();

  if (t.includes("erdnuss") || t.includes("peanut")) {
    show("🔴 Enthält Erdnüsse", "red");
  } else if (t.includes("may contain") || t.includes("kann enthalten")) {
    show("🟡 Kann enthalten", "yellow");
  } else if (t.includes("spuren") || t.includes("traces")) {
    show("🟠 Spuren möglich", "orange");
  } else {
    show("🟢 Keine Erdnüsse", "green");
  }
}

function show(text, color) {
  const box = document.getElementById("resultBox");
  box.innerText = text;
  box.className = color;
  document.getElementById("status").innerText = "Fertig!";
}
</script>

</body>
</html>
