<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allergic Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
/* Allgemein */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  color: #111;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1f2937; /* dunkel */
  color: white;
  padding: 5px 10px;
  height: 50px;
}

header .left, header .right {
  display: flex;
  align-items: center;
}

header .left img {
  width: 24px;
  height: 24px;
  margin-right: 8px;
}

header .title {
  font-weight: bold;
  font-size: 18px;
}

header .right button {
  background: #374151;
  border: none;
  color: white;
  margin-left: 8px;
  padding: 5px 8px;
  border-radius: 50%;
  font-size: 12px;
  cursor: pointer;
}

/* Zentrale Karte */
.main-card {
  background: white;
  margin: 15px;
  border-radius: 20px;
  padding: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.15);
  overflow-y: auto;
}

.main-card .icon-circle {
  width: 120px;
  height: 120px;
  background: #f9a8d4;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 48px;
  color: white;
  margin-bottom: 15px;
}

.main-card h1 {
  margin: 10px 0 5px 0;
  font-size: 22px;
  color: #111;
}

.main-card p {
  font-size: 14px;
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

/* Video & Canvas */
video {
  width: 80%;
  max-width: 300px;
  border-radius: 15px;
  margin-bottom: 15px;
}

canvas {
  display: none;
}

/* Buttons */
button.primary {
  background: #1e3a8a;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 12px;
  margin: 5px 0;
  width: 80%;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

button.secondary {
  background: white;
  color: #1e3a8a;
  border: 2px solid #1e3a8a;
  padding: 12px 20px;
  border-radius: 12px;
  margin: 5px 0;
  width: 80%;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* Status & Ergebnis */
#status {
  margin: 10px 0;
}

#resultBox {
  margin: 10px 0;
  padding: 15px;
  border-radius: 15px;
  font-size: 18px;
  font-weight: bold;
  width: 90%;
  text-align: center;
}

.green { background: #22c55e; color: white; }
.yellow { background: #eab308; color: white; }
.orange { background: #f97316; color: white; }
.red { background: #ef4444; color: white; }

/* Untere Navigation */
nav {
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: #1f2937;
  color: white;
  padding: 8px 0;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

nav button.active {
  background: #d1d5db;
  color: #111;
  border-radius: 12px;
  padding: 5px 10px;
}

/* Responsive */
@media (orientation: landscape) {
  .main-card {
    flex-direction: row;
    justify-content: space-around;
  }
  .main-card .icon-circle {
    margin-bottom: 0;
  }
  .main-card h1, .main-card p {
    text-align: left;
  }
  video {
    max-width: 200px;
  }
}
</style>
</head>

<body>

<header>
  <div class="left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Red_Exclamation_Triangle.svg" alt="App-Logo">
    <span class="title">Allergic Scanner</span>
  </div>
  <div class="right">
    <button title="HQ">HQ</button>
    <button title="DE ONLY">DE</button>
    <button title="FR ONLY">FR</button>
    <button title="Refresh">⟳</button>
  </div>
</header>

<div class="main-card">
  <div class="icon-circle">📷</div>
  <h1>Allergic Scanner</h1>
  <p>Scannt Etiketten lokal nach Erdnuss-Begriffen.</p>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <button class="primary" onclick="scan()">📸 Scanner aktivieren</button>
  <button class="secondary" onclick="uploadPhoto()">⬆️ Foto hochladen</button>
  <p id="status"></p>
  <div id="resultBox"></div>
</div>

<nav>
  <button>Chat</button>
  <button class="active">Preview</button>
  <button>⋯</button>
</nav>

<script>
const HF_API_KEY = "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"; // ← HIER deinen Token einsetzen

const video = document.getElementById('video');

// Kamera starten
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => video.srcObject = stream)
.catch(() => alert("Kamera nicht verfügbar"));

async function scan() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  document.getElementById("status").innerText = "Scanne Text...";

  const { data: { text } } = await Tesseract.recognize(canvas, 'eng');

  document.getElementById("status").innerText = "Analysiere mit KI...";

  try {
    const response = await fetch(
      "https://api-inference.huggingface.co/models/facebook/bart-large-mnli",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + HF_API_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          inputs: text,
          parameters: {
            candidate_labels: [
              "contains peanuts",
              "may contain peanuts",
              "traces of peanuts",
              "no peanuts"
            ]
          }
        })
      }
    );

    const data = await response.json();

    const label = data.labels[0];

    if (label === "contains peanuts") {
      show("🔴 Enthält Erdnüsse", "red");
    } else if (label === "may contain peanuts") {
      show("🟡 Kann enthalten", "yellow");
    } else if (label === "traces of peanuts") {
      show("🟠 Spuren möglich", "orange");
    } else {
      show("🟢 Keine Erdnüsse", "green");
    }

  } catch (e) {
    fallbackCheck(text);
  }
}

function fallbackCheck(text) {
  const t = text.toLowerCase();

  if (t.includes("erdnuss") || t.includes("peanut")) {
    show("🔴 Enthält Erdnüsse", "red");
  } else if (t.includes("may contain") || t.includes("kann enthalten")) {
    show("🟡 Kann enthalten", "yellow");
  } else if (t.includes("spuren") || t.includes("traces")) {
    show("🟠 Spuren möglich", "orange");
  } else {
    show("🟢 Keine Erdnüsse", "green");
  }
}

function show(text, color) {
  const box = document.getElementById("resultBox");
  box.innerText = text;
  box.className = color;
  document.getElementById("status").innerText = "Fertig!";
}

function uploadPhoto() {
  alert("Upload-Funktion noch nicht implementiert.");
}
</script>

</body>
</html>
