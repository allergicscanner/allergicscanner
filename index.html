<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Erdnuss Checker</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body style="font-family: Arial; text-align: center; padding: 30px;">

  <h1>Erdnuss-Scanner</h1>

  <input type="file" id="imageInput" accept="image/*" capture="environment">
  <br><br>

  <button onclick="scanImage()">Scannen</button>

  <p id="status"></p>
  <h2 id="result"></h2>

  <script>
    async function scanImage() {
      const file = document.getElementById('imageInput').files[0];
      if (!file) {
        alert("Bitte Bild auswählen");
        return;
      }

      document.getElementById('status').innerText = "Scanne...";
      document.getElementById('result').innerText = "";

      const { data: { text } } = await Tesseract.recognize(
        file,
        'deu+eng'
      );

      const lower = text.toLowerCase();

      let result = "Keine Erdnuss gefunden";

      if (lower.includes("erdnuss")) {
        result = "Erdnuss enthalten";
      }

      if (lower.includes("kann spuren von erdnuss enthalten")) {
        result = "Spuren möglich";
      }

      document.getElementById('status').innerText = "Fertig!";
      document.getElementById('result').innerText = result;
    }
  </script>

</body>
</html>
